name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            targets: linux-x64 linux-x64-musl
          - name: linux-arm64
            os: ubuntu-24.04-arm
            targets: linux-arm64 linux-arm64-musl
          - name: darwin-x64
            os: macos-13-large
            targets: darwin-x64
          - name: darwin-arm64
            os: macos-latest
            targets: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p dist
          for target in ${{ matrix.targets }}; do
            echo "Building gambit-$target on ${{ matrix.os }}..."
            bun build \
              --compile \
              --minify \
              --target="bun-$target" \
              src/gambit.tsx \
              --outfile "dist/gambit-$target"
          done
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambit-${{ matrix.name }}
          path: dist/gambit-*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p dist
          find artifacts -type f -name 'gambit-*' -exec cp -v {} dist/ \;
          ls -la dist

      - name: Generate manifest.json
        run: |
          version="${{ steps.version.outputs.version }}"
          {
            printf '{\n'
            printf '  "version": "%s",\n' "$version"
            printf '  "platforms": {\n'
            first=true
            for bin in dist/gambit-*; do
              [ -f "$bin" ] || continue
              name=$(basename "$bin")
              platform="${name#gambit-}"
              checksum=$(sha256sum "$bin" | cut -d' ' -f1)
              if [ "$first" = true ]; then
                first=false
              else
                printf ',\n'
              fi
              printf '    "%s": { "checksum": "%s" }' "$platform" "$checksum"
            done
            printf '\n  }\n}\n'
          } > dist/manifest.json
          cat dist/manifest.json

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum gambit-* manifest.json > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/gambit-linux-x64
            dist/gambit-linux-x64-musl
            dist/gambit-linux-arm64
            dist/gambit-linux-arm64-musl
            dist/gambit-darwin-x64
            dist/gambit-darwin-arm64
            dist/manifest.json
            dist/SHA256SUMS
