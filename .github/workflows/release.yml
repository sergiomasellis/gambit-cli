name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump to release'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: 'Exact version for custom releases (e.g. 0.8.0 or v0.8.0)'
        required: false

permissions:
  contents: write

jobs:
  test:
    name: Test and prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check and test
        run: |
          bun run tsc --noEmit
          bun test

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
              echo "Manual releases must be run from a branch, not ${GITHUB_REF_TYPE} ${GITHUB_REF_NAME}." >&2
              exit 1
            fi

            current_version="$(node -p "require('./package.json').version")"
            release_type="${{ github.event.inputs.release_type }}"
            custom_version="${{ github.event.inputs.version }}"

            if [ "$release_type" = "custom" ]; then
              if [ -z "$custom_version" ]; then
                echo "Custom releases require the version input." >&2
                exit 1
              fi
              version="${custom_version#v}"
            else
              node -e "
                const current = process.argv[1];
                const releaseType = process.argv[2];
                const match = current.match(/^(\\d+)\\.(\\d+)\\.(\\d+)$/);
                if (!match) {
                  throw new Error('package.json version must be x.y.z, got ' + current);
                }
                const parts = match.slice(1).map(Number);
                if (releaseType === 'major') {
                  parts[0] += 1; parts[1] = 0; parts[2] = 0;
                } else if (releaseType === 'minor') {
                  parts[1] += 1; parts[2] = 0;
                } else if (releaseType === 'patch') {
                  parts[2] += 1;
                } else {
                  throw new Error('Unsupported release type: ' + releaseType);
                }
                process.stdout.write(parts.join('.'));
              " "$current_version" "$release_type" > .next-version
              version="$(cat .next-version)"
              rm .next-version
            fi

            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release version must be x.y.z, got $version" >&2
              exit 1
            fi

            tag="v$version"
            if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
              echo "Tag $tag already exists locally." >&2
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists." >&2
              exit 1
            fi

            node -e "
              const fs = require('node:fs');
              const version = process.argv[1];
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = version;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\\n');
            " "$version"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            if git diff --cached --quiet; then
              echo "package.json already has version $version; tagging current commit."
            else
              git commit -m "chore(release): $tag"
            fi
            git tag -a "$tag" -m "Release $tag"
            git push origin "HEAD:${{ github.ref_name }}"
            git push origin "$tag"
          else
            tag="${GITHUB_REF_NAME}"
            tag="v${tag#v}"
            version="${tag#v}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            targets: linux-x64 linux-x64-musl
          - name: linux-arm64
            os: ubuntu-24.04-arm
            targets: linux-arm64 linux-arm64-musl
          - name: darwin-x64
            os: macos-15-intel
            targets: darwin-x64
          - name: darwin-arm64
            os: macos-latest
            targets: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.test.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p dist
          for target in ${{ matrix.targets }}; do
            echo "Building gambit-$target on ${{ matrix.os }}..."
            bun build \
              --compile \
              --minify \
              --target="bun-$target" \
              src/gambit.tsx \
              --outfile "dist/gambit-$target"
          done
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambit-${{ matrix.name }}
          path: dist/gambit-*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p dist
          find artifacts -type f -name 'gambit-*' -exec cp -v {} dist/ \;
          ls -la dist

      - name: Generate manifest.json
        run: |
          version="${{ needs.test.outputs.version }}"
          {
            printf '{\n'
            printf '  "version": "%s",\n' "$version"
            printf '  "platforms": {\n'
            first=true
            for bin in dist/gambit-*; do
              [ -f "$bin" ] || continue
              name=$(basename "$bin")
              platform="${name#gambit-}"
              checksum=$(sha256sum "$bin" | cut -d' ' -f1)
              if [ "$first" = true ]; then
                first=false
              else
                printf ',\n'
              fi
              printf '    "%s": { "checksum": "%s" }' "$platform" "$checksum"
            done
            printf '\n  }\n}\n'
          } > dist/manifest.json
          cat dist/manifest.json

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum gambit-* manifest.json > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.test.outputs.tag }}
          name: ${{ needs.test.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/gambit-linux-x64
            dist/gambit-linux-x64-musl
            dist/gambit-linux-arm64
            dist/gambit-linux-arm64-musl
            dist/gambit-darwin-x64
            dist/gambit-darwin-arm64
            dist/manifest.json
            dist/SHA256SUMS
